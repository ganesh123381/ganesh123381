name: Update GitHub Profile Insights Card

on:
  schedule:
    - cron: "0 0 * * *"   # once a day, midnight UTC
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  update-card:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate profile-card.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
          GITHUB_USERNAME: ganesh123381
        run: python generate_card.py

      - name: Commit updated card
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-card.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update GitHub profile insights card"
          git push
